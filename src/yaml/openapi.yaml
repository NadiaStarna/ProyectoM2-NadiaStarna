openapi: "3.0.0"

info:
  title: MiniBlog API
  version: "1.0.0"
  description: API REST para gestión de autores y posts

servers:
  - url: http://localhost:3000/api
    description: Servidor local
  - url: https://proyectom2-nadiastarna-production-dc94.up.railway.app/api
    description: Servidor producción Railway

tags:
  - name: Authors
    description: Operaciones sobre autores
  - name: Posts
    description: Operaciones sobre posts

paths:

  /authors:
    get:
      tags: [Authors]
      summary: Listar todos los autores
      responses:
        "200":
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"

    post:
      tags: [Authors]
      summary: Crear un autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "201":
          description: Autor creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Datos inválidos

  /authors/{id}:
    get:
      tags: [Authors]
      summary: Obtener autor por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "404":
          description: Autor no encontrado

    put:
      tags: [Authors]
      summary: Actualizar autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "200":
          description: Autor actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Datos inválidos
        "404":
          description: Autor no encontrado

    delete:
      tags: [Authors]
      summary: Eliminar autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Autor eliminado
        "404":
          description: Autor no encontrado

  /posts:
    get:
      tags: [Posts]
      summary: Listar todos los posts
      responses:
        "200":
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

    post:
      tags: [Posts]
      summary: Crear un post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Datos inválidos

  /posts/{id}:
    get:
      tags: [Posts]
      summary: Obtener post por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Post no encontrado

    put:
      tags: [Posts]
      summary: Actualizar post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "200":
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Datos inválidos
        "404":
          description: Post no encontrado

    delete:
      tags: [Posts]
      summary: Eliminar post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Post eliminado
        "404":
          description: Post no encontrado

components:
  schemas:

    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Nadia"
        email:
          type: string
          example: "starnanadia00@gmail.com"

    AuthorInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          example: "Nadia"
        email:
          type: string
          example: "starnanadia00@gmail.com"

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Mi primer post"
        content:
          type: string
          example: "Contenido del post"
        author_id:
          type: integer
          example: 1

    PostInput:
      type: object
      required: [title, content, author_id]
      properties:
        title:
          type: string
          example: "Nuevo post"
        content:
          type: string
          example: "Texto del post"
        author_id:
          type: integer
          example: 1